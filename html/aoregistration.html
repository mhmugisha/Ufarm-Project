<!doctype html>
<html lang="en">

<head>
  <title>Title</title>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS v5.2.1 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">

    
<link rel="stylesheet" href="aoregistration.css">

    
</head>

<body>
  

<div class="container">
    <div class="heading">Agricultural Officer Registration</div>
    <form action="/register" method="post">
        <div class="card-details">

            <!-- Unique ID -->
            <div class="card-box">
               <label>Unique ID</label>
                <input 
                type="numeric" 
                placeholder="Enter your unique ID" 
                id="unique"
                name="unique" 
                onblur="validateId()"> 
            </div>

            <!-- User name -->
            <div class="card-box">
                <label class="details">User Name</label>
                <input 
                type="text" 
                id="username" 
                name="username"
                placeholder="Enter user name"
                onblur="validateUserName()">
            </div>

            <!-- Email -->
            <div class="card-box">
                <label class="details">Email</label>
                <input 
                type="email" 
                id="email"
                name="email"
                placeholder="Enter your email"
                onblur="validateEmail()">  
            </div>
            
            <!-- Phone Number -->
            <div class="card-box">
                <label class="details">Phone Number</label>
                <input 
                type="phone"
                id="phone" 
                phone="phone"
                placeholder="Enter your phone number"
                onblur="validatePhoneNumber()">
            </div>

            <!-- Password -->
            <div class="card-box">
                <label class="details">Password</label>
                <input 
                type="password"
                id="password"
                name="password"
                >
            </div>

            <!-- Confirm Password -->
            <div class="card-box">
                <label class="details">Confirm password</label>
                <input 
                type="password" 
                id="confirmpassword"
                name="confirmpassword"
                onblur="validatePassword()"
                
                >
            </div>
        </div>
        <div class="circal-form">
            <label class="circal-title">Gender</label>
            <div class="category"></div>
            <input type="radio" name="male">Male
            <input type="radio" name="female">Female
            
        </div>



        <div class="button">
            <input type="submit" id="btnSubmit" value="Register" onclick="return validate()"/>
        </div>
    </form>

</div>


</body>
<script > </script>
</html>
