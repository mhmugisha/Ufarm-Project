<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags-->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Title Page-->
    <title>Product Update</title>

    <!-- Icons font CSS-->
    <link
      href="vendor/mdi-font/css/material-design-iconic-font.min.css"
      rel="stylesheet"
      media="all"
    />
    <link
      href="vendor/font-awesome-4.7/css/font-awesome.min.css"
      rel="stylesheet"
      media="all"
    />
    <!-- Font special for pages-->
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:100,100i,200,200i,300,300i,400,400i,500,500i,600,600i,700,700i,800,800i,900,900i"
      rel="stylesheet"
    />

    <!-- Vendor CSS-->
    <link href="vendor/select2/select2.min.css" rel="stylesheet" media="all" />
    <link
      href="vendor/datepicker/daterangepicker.css"
      rel="stylesheet"
      media="all"
    />

    <!-- Main CSS-->
    <link href="../css/productupdate.css" rel="stylesheet" media="all" />
  </head>

  <body>
    <div class="page-wrapper bg-gra-02 p-t-130 p-b-100 font-poppins">
      <div class="wrapper wrapper--w680">
        <div class="card card-4">
          <div class="card-body">
            <h2 class="title">Product Update</h2>
            <form action="/register" method="post">
              <!-- Full name and upload date -->
              <div class="row row-space">
                <div class="col-2">
                  <div class="input-group">
                    <label class="label">Full Name</label>
                    <input class="input--style-4" type="text" name="fullname" />
                  </div>
                </div>
                <div class="col-2">
                  <div class="input-group">
                    <label class="label">Date</label>
                    <input class="input--style-4" type="date" name="date" />
                  </div>
                </div>
              </div>
              <!-- Product and quantity div/row -->
              <div class="row row-space">
                <div class="col-2">
                  <div class="input-group">
                    <label class="label">Product</label>
                    <input class="input--style-4" type="text" name="product" />
                  </div>
                </div>
                <div class="col-2">
                  <div class="input-group">
                    <label class="label">Quantity</label>
                    <div class="input-group-icon">
                      <input
                        class="input--style-4"
                        type="number"
                        name="quantity"
                      />
                    </div>
                  </div>
                </div>
              </div>
              <!--*** Unit row/div  -->
              <div class="row row-space">
                <div class="col-2">
                  <div class="input-group">
                    <label class="label">Unit</label>
                    <div class="input-group-icon">
                      <input class="input--style-4" type="text" name="unit" />
                    </div>
                  </div>
                </div>
                <div class="col-2">
                  <div class="input-group">
                    <label class="label">Unit Price</label>
                    <div class="input-group-icon">
                      <input
                        class="input--style-4"
                        type="text"
                        name="unitprice"
                      />
                    </div>
                  </div>
                </div>
              </div>
              <!-- Total and Directions -->
              <div class="row row-space">
                <div class="col-2">
                  <div class="input-group">
                    <label class="label">Total Amount</label>
                    <input class="input--style-4" type="number" name="total" />
                  </div>
                </div>
                <div class="input-group">
                  <label class="label">Directions</label>
                  <div class="rs-select2 js-select-simple select--no-search">
                    <select name="directions">
                      <option disabled="disabled" selected="selected">
                        Select
                      </option>
                      <option>Ward A</option>
                      <option>Ward B</option>
                      <option>Ward C</option>
                      <option>Ward D</option>
                    </select>
                    <div class="select-dropdown"></div>
                  </div>
                </div>
              </div>
              <!-- Mode of payment -->
              <div class="row row-space">
                <div class="input-group">
                  <label class="label">Mode of payment</label>
                  <div class="rs-select2 js-select-simple select--no-search">
                    <select name="residencetype">
                      <option disabled="disabled" selected="selected">
                        Select
                      </option>
                      <option>Cash</option>
                      <option>Mobile money</option>
                    </select>
                    <div class="select-dropdown"></div>
                  </div>
                </div>
                <!--******* Product Type **************-->
                <div class="input-group">
                  <label class="label">Product Type</label>
                  <div class="rs-select2 js-select-simple select--no-search">
                    <select name="producttype">
                      <option disabled="disabled" selected="selected">
                        Select
                      </option>
                      <option>Organic</option>
                      <option>None organic</option>
                    </select>
                    <div class="select-dropdown"></div>
                  </div>
                </div>
                <!-- **** Mode of Delivery******** -->
                <div class="input-group">
                  <label class="label">Mode of Delivery</label>
                  <div class="rs-select2 js-select-simple select--no-search">
                    <select name="modeofdelivery">
                      <option disabled="disabled" selected="selected">
                        Select
                      </option>
                      <option>Pick up</option>
                      <option>Home delivery</option>
                    </select>
                    <div class="select-dropdown"></div>
                  </div>
                </div>
              </div>
              <!-- Button -->
              <div class="p-t-15">
                <button class="btn btn--radius-2 btn--blue" type="submit">
                  Submit
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
